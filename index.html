<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a; /* Глубокий черный */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2e1a47 0%, #0a0a0a 70%);
            text-align: center;
        }
        .logo-title {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #8a2be2; /* Фиолетовое свечение */
        }
        .cta-button {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #8a2be2;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .cta-button:hover {
            background: #8a2be2;
            box-shadow: 0 0 30px #8a2be2;
        }
        /* Анимация плавного появления */
        .fade-in { animation: fadeIn 1.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <section class="hero fade-in">
        <h1 class="logo-title">IMPACT VISUALS</h1>
        <p>Максимальная оптимизация. Твой стиль в каждом кадре.</p>
        <button class="cta-button">Скачать Launcher</button>
    </section>
</body>
</html>
